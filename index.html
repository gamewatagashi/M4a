<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAV to M4A 変換器 (診断機能付き)</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input[type="file"] { display: none; }
        .file-label {
            display: inline-block;
            background: #007aff;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button {
            margin-top: 20px;
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: none;
            font-size: 16px;
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; color: #666; font-size: 14px; text-align: left; word-break: break-all; background: #f8f9fa; padding: 10px; border-radius: 6px; }
        #fileName { margin-top: 10px; font-size: 14px; color: #333; font-weight: bold; }
        .info-box { margin-top: 20px; font-size: 12px; color: #666; border-top: 1px dashed #ccc; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>WAV ➔ M4A 変換</h2>
        <label for="uploader" class="file-label">WAVファイルを選択</label>
        <input type="file" id="uploader" accept="audio/wav">
        <div id="fileName"></div>
        <button id="convertBtn">M4Aに変換してダウンロード</button>
        <div id="status">ステータス: 待機中</div>

        <div class="info-box">
            セキュリティ解除状態: <span id="securityStatus">確認中...</span>
        </div>
    </div>

    <script type="module">
        import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.15/dist/esm/index.js';
        
        const ffmpeg = new FFmpeg();
        const convertBtn = document.getElementById('convertBtn');
        const uploader = document.getElementById('uploader');
        const status = document.getElementById('status');
        const fileName = document.getElementById('fileName');
        const securityStatus = document.getElementById('securityStatus');

        // セキュリティ状態のチェック
        if (window.crossOriginIsolated) {
            securityStatus.innerHTML = "<b style='color: green;'>解禁済み (OK)</b>";
        } else {
            securityStatus.innerHTML = "<b style='color: orange;'>制限あり (再読み込みするか、数秒お待ちください)</b>";
        }

        uploader.addEventListener('change', () => {
            if (uploader.files.length > 0) {
                fileName.textContent = `選択中: ${uploader.files[0].name} (${(uploader.files[0].size / 1024 / 1024).toFixed(2)} MB)`;
                convertBtn.style.display = 'block';
            }
        });

        convertBtn.addEventListener('click', async () => {
            convertBtn.disabled = true;
            uploader.disabled = true;
            status.innerHTML = '<b>1/4:</b> 変換エンジンをロード中...';
            
            try {
                await ffmpeg.load({
                    coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.js',
                });

                const file = uploader.files[0];
                status.innerHTML = '<b>2/4:</b> ファイルをブラウザメモリに読み込み中...';

                const fileData = await file.arrayBuffer();
                await ffmpeg.writeFile('input.wav', new Uint8Array(fileData));

                status.innerHTML = '<b>3/4:</b> M4Aへ変換中（ここが一番重いです）...';
                await ffmpeg.exec(['-i', 'input.wav', '-c:a', 'aac', 'output.m4a']);

                status.innerHTML = '<b>4/4:</b> 変換完了！ダウンロード処理中...';
                const data = await ffmpeg.readFile('output.m4a');
                
                const blob = new Blob([data.buffer], { type: 'audio/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = file.name.replace('.wav', '.m4a');
                a.click();
                status.innerHTML = '<span style="color: green;">✔ 全ての処理が正常に完了しました！</span>';
            } catch (error) {
                console.error(error);
                // エラーの具体的内容を画面に生々しく表示する
                status.innerHTML = `<span style="color: red; font-weight: bold;">❌ エラー発生：</span><br><small style="color: #c00;">${error.name}: ${error.message}</small><br><br>※ファイルが大きすぎるか、セキュリティ制限に引っかかっている可能性があります。`;
            } finally {
                convertBtn.disabled = false;
                uploader.disabled = false;
            }
        });
    </script>
</body>
</html>
